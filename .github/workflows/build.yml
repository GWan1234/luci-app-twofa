name: "Auto compile luci-app-twofa"

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  OPENWRT_VERSION: "24.10.0"
  OPENWRT_BRANCH: "openwrt-24.10"
  GCC_VERSION: "13.3.0"

jobs:
  build_packages:
    name: Build IPK (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x86_64
            sdk_target: x86/64
            sdk_name: x86-64
          - platform: aarch64
            sdk_target: armsr/armv8
            sdk_name: armsr-armv8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get -qq update
          sudo apt-get -qq install build-essential libncurses-dev gawk git gettext \
            libssl-dev xsltproc zip zlib1g-dev file zstd rsync python3-pyelftools lua5.1 wget

      - name: Download OpenWrt SDK
        run: |
          SDK_FILE="openwrt-sdk-${OPENWRT_VERSION}-${{ matrix.sdk_name }}_gcc-${GCC_VERSION}_musl.Linux-x86_64.tar.zst"
          SDK_URL="https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${{ matrix.sdk_target }}/${SDK_FILE}"
          echo "Downloading ${SDK_URL}"
          wget -q "$SDK_URL"
          mkdir -p sdk
          tar --zstd -xf "$SDK_FILE" -C ./sdk --strip-components=1

      - name: Inject plugin
        run: |
          DEST="$GITHUB_WORKSPACE/sdk/package/luci-app-twofa"
          rm -rf "$DEST"
          mkdir -p "$DEST"
          cp -r Makefile luasrc root htdocs po "$DEST/"
          find "$DEST" -name "*.iml" -delete

      - name: Prepare feeds
        run: |
          cd "$GITHUB_WORKSPACE/sdk"
          ./scripts/feeds update base packages routing telephony || true
          if [ ! -f feeds/luci/luci.mk ]; then
            rm -rf feeds/luci
            git clone --depth 1 -b "$OPENWRT_BRANCH" https://github.com/openwrt/luci.git feeds/luci \
              || git clone --depth 1 https://github.com/openwrt/luci.git feeds/luci
          fi
          ./scripts/feeds install luci-base luci-compat luci-lib-nixio qrencode

      - name: Configure and compile
        run: |
          cd "$GITHUB_WORKSPACE/sdk"
          rm -rf tmp
          make package/symlinks
          echo "CONFIG_PACKAGE_luci-app-twofa=m" >> .config
          make defconfig
          grep '^CONFIG_PACKAGE_luci-app-twofa=m' .config
          make package/luci-app-twofa/compile -j"$(nproc)" V=s

      - name: Collect IPK
        run: |
          mkdir -p "$GITHUB_WORKSPACE/release"
          IPK="$(find "$GITHUB_WORKSPACE/sdk/bin/packages" -name 'luci-app-twofa*.ipk' | head -1)"
          if [ -z "$IPK" ]; then
            echo "ERROR: luci-app-twofa IPK not found" >&2
            exit 1
          fi
          cp "$IPK" "$GITHUB_WORKSPACE/release/luci-app-twofa_${{ matrix.platform }}_all.ipk"
          ls -lh "$GITHUB_WORKSPACE/release"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-twofa-${{ matrix.platform }}
          path: ${{ github.workspace }}/release/*.ipk

  release_upload:
    name: Upload Release Assets
    if: startsWith(github.ref, 'refs/tags/')
    needs: build_packages
    runs-on: ubuntu-latest

    steps:
      - name: Download all IPK artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: luci-app-twofa-*
          merge-multiple: true

      - name: List release files
        run: find artifacts -name '*.ipk' -exec ls -lh {} \;

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.ipk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
