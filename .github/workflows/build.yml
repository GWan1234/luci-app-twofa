name: "Auto compile luci-app-twofa"

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  OPENWRT_VERSION: "24.10.0"
  OPENWRT_BRANCH: "openwrt-24.10"

jobs:
  build_packages:
    name: Build IPK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get -qq update
          sudo apt-get -qq install build-essential libncurses-dev gawk git gettext \
            libssl-dev xsltproc zip zlib1g-dev file zstd rsync python3-pyelftools lua5.1

      - name: Download OpenWrt SDK
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/x86/64/openwrt-sdk-${OPENWRT_VERSION}-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          wget -q "$SDK_URL"
          mkdir -p sdk
          tar --zstd -xf "openwrt-sdk-${OPENWRT_VERSION}-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst" -C ./sdk --strip-components=1

      - name: Inject plugin
        run: |
          DEST="$GITHUB_WORKSPACE/sdk/package/luci-app-twofa"
          rm -rf "$DEST"
          mkdir -p "$DEST"
          cp -r Makefile luasrc root htdocs po "$DEST/"
          find "$DEST" -name "*.iml" -delete

      - name: Prepare feeds
        run: |
          cd "$GITHUB_WORKSPACE/sdk"
          ./scripts/feeds update base packages routing telephony || true
          if [ ! -f feeds/luci/luci.mk ]; then
            rm -rf feeds/luci
            git clone --depth 1 -b "$OPENWRT_BRANCH" https://github.com/openwrt/luci.git feeds/luci \
              || git clone --depth 1 https://github.com/openwrt/luci.git feeds/luci
          fi
          ./scripts/feeds install luci-base luci-compat luci-lib-nixio qrencode

      - name: Configure and compile
        run: |
          cd "$GITHUB_WORKSPACE/sdk"
          rm -rf tmp
          make package/symlinks
          echo "CONFIG_PACKAGE_luci-app-twofa=m" >> .config
          make defconfig
          grep '^CONFIG_PACKAGE_luci-app-twofa=m' .config
          make package/luci-app-twofa/compile -j"$(nproc)" V=s

      - name: Collect IPK
        run: |
          mkdir -p "$GITHUB_WORKSPACE/release"
          find "$GITHUB_WORKSPACE/sdk/bin/packages" -name "luci-app-twofa*.ipk" -exec cp -t "$GITHUB_WORKSPACE/release" {} +
          ls -lh "$GITHUB_WORKSPACE/release"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-twofa
          path: ${{ github.workspace }}/release/*.ipk

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.workspace }}/release/*.ipk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
